    <style>
        :root {
            --petronas-green: #00B1A9;
            --white: #FFFFFF;
            --purple: #763F98;
            --dark-blue: #20419A;
            --gold-yellow: #FDB924;
            --lime-green: #BFD730;
            --bg-dark: #121A24;
            --card-bg: #1A2633;
            --text-muted: #8FA3B5;

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 412px;
            background: linear-gradient(145deg, var(--card-bg), #151F2B);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        header h1 span {
            color: var(--petronas-green);
        }

        .specs-badge {
            display: inline-block;
            background-color: rgba(0, 177, 169, 0.15);
            color: var(--petronas-green);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            border: 1px solid rgba(0, 177, 169, 0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, select {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 1rem;
            color: var(--white);
            outline: none;
            transition: all 0.25s ease;
            -webkit-appearance: none;
        }

        input:focus, select:focus {
            border-color: var(--petronas-green);
            box-shadow: 0 0 0 3px rgba(0, 177, 169, 0.2);
            background-color: rgba(255, 255, 255, 0.06);
        }

            position: absolute;
            right: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--petronas-green);
            pointer-events: none;
        }
